name: Python Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate dataset manifests
        run: python3 ml/scripts/inspect_dataset.py

      - name: Run annotation QC summary
        run: python3 ml/scripts/annotation_qc.py
